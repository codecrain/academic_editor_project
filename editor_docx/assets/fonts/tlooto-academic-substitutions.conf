<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "urn:fontconfig:fonts.dtd">
<fontconfig>
  <!-- Metric-compatible Office substitutions for fonts that cannot be redistributed. -->
  <alias><family>Calibri</family><prefer><family>Carlito</family></prefer></alias>
  <alias><family>Calibri Light</family><prefer><family>Carlito</family></prefer></alias>
  <alias><family>Aptos</family><prefer><family>Carlito</family></prefer></alias>
  <alias><family>Aptos Display</family><prefer><family>Carlito</family></prefer></alias>
  <alias><family>Cambria</family><prefer><family>Caladea</family></prefer></alias>
  <alias><family>Cambria Math</family><prefer><family>STIX Math</family><family>STIX Two Math</family></prefer></alias>
  <alias><family>Wingdings</family><prefer><family>Webdings</family></prefer></alias>
  <alias><family>Arial Narrow</family><prefer><family>Liberation Sans Narrow</family></prefer></alias>
  <alias><family>Helvetica</family><prefer><family>Nimbus Sans</family></prefer></alias>
  <alias><family>Palatino Linotype</family><prefer><family>TeX Gyre Pagella</family></prefer></alias>
  <alias><family>Book Antiqua</family><prefer><family>TeX Gyre Pagella</family></prefer></alias>
  <alias><family>Garamond</family><prefer><family>EB Garamond</family></prefer></alias>
  <alias><family>Century Schoolbook</family><prefer><family>TeX Gyre Schola</family></prefer></alias>

  <!-- Korean document substitutions preserve serif/sans intent. -->
  <alias><family>Malgun Gothic</family><prefer><family>Noto Sans CJK KR</family></prefer></alias>
  <alias><family>맑은 고딕</family><prefer><family>Noto Sans CJK KR</family></prefer></alias>
  <alias><family>Batang</family><prefer><family>NanumMyeongjo</family></prefer></alias>
  <alias><family>BatangChe</family><prefer><family>NanumMyeongjo</family></prefer></alias>
  <alias><family>바탕</family><prefer><family>NanumMyeongjo</family></prefer></alias>
  <alias><family>바탕체</family><prefer><family>NanumMyeongjo</family></prefer></alias>
  <alias><family>Gulim</family><prefer><family>NanumGothic</family></prefer></alias>
  <alias><family>GulimChe</family><prefer><family>NanumGothicCoding</family></prefer></alias>
  <alias><family>굴림</family><prefer><family>NanumGothic</family></prefer></alias>
  <alias><family>굴림체</family><prefer><family>NanumGothicCoding</family></prefer></alias>
  <alias><family>Dotum</family><prefer><family>NanumGothic</family></prefer></alias>
  <alias><family>DotumChe</family><prefer><family>NanumGothicCoding</family></prefer></alias>
  <alias><family>돋움</family><prefer><family>NanumGothic</family></prefer></alias>
  <alias><family>돋움체</family><prefer><family>NanumGothicCoding</family></prefer></alias>
  <alias><family>Gungsuh</family><prefer><family>UnGungseo</family></prefer></alias>
  <alias><family>궁서</family><prefer><family>UnGungseo</family></prefer></alias>
  <alias><family>HCR Batang</family><prefer><family>Noto Serif CJK KR</family></prefer></alias>
  <alias><family>함초롬바탕</family><prefer><family>Noto Serif CJK KR</family></prefer></alias>
  <alias><family>HCR Dotum</family><prefer><family>Noto Sans CJK KR</family></prefer></alias>
  <alias><family>함초롬돋움</family><prefer><family>Noto Sans CJK KR</family></prefer></alias>
  <alias><family>KoPub바탕체 Medium</family><prefer><family>Noto Serif CJK KR</family></prefer></alias>
  <alias><family>KoPubWorld Batang</family><prefer><family>Noto Serif CJK KR</family></prefer></alias>
  <alias><family>KoPubWorld Dotum</family><prefer><family>Noto Sans CJK KR</family></prefer></alias>
  <alias><family>Apple SD Gothic Neo</family><prefer><family>Noto Sans CJK KR</family></prefer></alias>

  <!-- Ubuntu's generic Korean fallback rules can override aliases for these
       legacy Windows family names, so replace them with a strong family. -->
  <match target="pattern">
    <test name="family" compare="eq"><string>Palatino Linotype</string></test>
    <edit name="family" mode="assign" binding="strong"><string>TeX Gyre Pagella</string></edit>
  </match>
  <match target="pattern">
    <test name="family" compare="eq"><string>Cambria Math</string></test>
    <edit name="family" mode="assign" binding="strong"><string>STIX Math</string></edit>
  </match>
  <match target="pattern">
    <test name="family" compare="eq"><string>Malgun Gothic</string></test>
    <edit name="family" mode="assign" binding="strong"><string>Noto Sans CJK KR</string></edit>
  </match>
  <match target="pattern">
    <test name="family" compare="eq"><string>KoPub바탕체 Medium</string></test>
    <edit name="family" mode="assign" binding="strong"><string>Noto Serif CJK KR</string></edit>
  </match>
  <match target="pattern">
    <test name="family" compare="eq"><string>Wingdings</string></test>
    <edit name="family" mode="assign" binding="strong"><string>Webdings</string></edit>
  </match>
  <match target="pattern">
    <test name="family" compare="eq"><string>Batang</string></test>
    <edit name="family" mode="assign" binding="strong"><string>NanumMyeongjo</string></edit>
  </match>
  <match target="pattern">
    <test name="family" compare="eq"><string>BatangChe</string></test>
    <edit name="family" mode="assign" binding="strong"><string>NanumMyeongjo</string></edit>
  </match>
  <match target="pattern">
    <test name="family" compare="eq"><string>바탕</string></test>
    <edit name="family" mode="assign" binding="strong"><string>NanumMyeongjo</string></edit>
  </match>
  <match target="pattern">
    <test name="family" compare="eq"><string>바탕체</string></test>
    <edit name="family" mode="assign" binding="strong"><string>NanumMyeongjo</string></edit>
  </match>
  <match target="pattern">
    <test name="family" compare="eq"><string>Gulim</string></test>
    <edit name="family" mode="assign" binding="strong"><string>NanumGothic</string></edit>
  </match>
  <match target="pattern">
    <test name="family" compare="eq"><string>GulimChe</string></test>
    <edit name="family" mode="assign" binding="strong"><string>NanumGothicCoding</string></edit>
  </match>
  <match target="pattern">
    <test name="family" compare="eq"><string>굴림</string></test>
    <edit name="family" mode="assign" binding="strong"><string>NanumGothic</string></edit>
  </match>
  <match target="pattern">
    <test name="family" compare="eq"><string>굴림체</string></test>
    <edit name="family" mode="assign" binding="strong"><string>NanumGothicCoding</string></edit>
  </match>
  <match target="pattern">
    <test name="family" compare="eq"><string>Dotum</string></test>
    <edit name="family" mode="assign" binding="strong"><string>NanumGothic</string></edit>
  </match>
  <match target="pattern">
    <test name="family" compare="eq"><string>DotumChe</string></test>
    <edit name="family" mode="assign" binding="strong"><string>NanumGothicCoding</string></edit>
  </match>
  <match target="pattern">
    <test name="family" compare="eq"><string>돋움</string></test>
    <edit name="family" mode="assign" binding="strong"><string>NanumGothic</string></edit>
  </match>
  <match target="pattern">
    <test name="family" compare="eq"><string>돋움체</string></test>
    <edit name="family" mode="assign" binding="strong"><string>NanumGothicCoding</string></edit>
  </match>
</fontconfig>
